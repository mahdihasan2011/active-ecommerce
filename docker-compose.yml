version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: active-ecommerce-postgres
    environment:
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: ecommerce_password
      POSTGRES_DB: active_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: active-ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: active-ecommerce-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearchdata:/usr/share/opensearch/data
    restart: always

  minio:
    image: minio/minio:latest
    container_name: active-ecommerce-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: always

volumes:
  pgdata:
  redisdata:
  opensearchdata:
  miniodata:
